<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Carte Var - Ruptures</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <!-- CSS de Leaflet MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <!-- JS de Leaflet MarkerCluster -->
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  
  
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
</head>

<body>
  <div id="login-screen">
    <div class="login-card">
      <h2>Accès Sécurisé</h2>
      <p>Cartographie Observatoir des Ruptures de Parcours (ORP) Var Ouest</p>

      <div class="input-group">
        <input type="password" id="password-input" placeholder="Mot de passe" />
        <button type="button" id="toggle-password" title="Afficher/masquer le mot de passe">👁️</button>
      </div>

      <button id="login-button">Se connecter</button>
      <p id="login-error" class="error-message"></p>
    </div>
  </div>

  <div id="topbar">
    <div class="filter-group filter-large">
      <label for="filter">Difficulté signalée</label>
      <div class="custom-select" id="custom-select-container">
        <div class="select-trigger" id="select-trigger">
          <span>Total (toutes les difficultés)</span>
          <span class="arrow">▼</span>
        </div>
        <div class="custom-options" id="custom-options-container">
          <!-- Les cases à cocher seront injectées dynamiquement par JS -->
        </div>
      </div>
    </div>

    <div class="filter-group">
      <label for="mode">Affichage</label>
      <select id="mode">
        <option value="commune" selected>Par commune</option>
        <option value="epci">Par EPCI</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="year">Année</label>
      <select id="year"></select>
    </div>

    <div class="filter-group">
      <label for="periodType">Type de période</label>
      <select id="periodType"></select>
    </div>

    <div class="filter-group">
      <label for="periodValue">Période exacte</label>
      <select id="periodValue"></select>
    </div>

    <!--
    <input type="file" id="csvFile" accept=".csv,text/csv"/>
    <button id="applyCsv">Charger le CSV</button>
    <span id="csvStatus"></span>
    -->

    <div class="info-badge">
      <span id="info"></span>
    </div>

    <button id="logout-button" title="Se déconnecter" class="logout-btn">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </button>
  </div>
  
  <div id="map"></div>

  <script src="./app.js"></script>
</body>
</html>
